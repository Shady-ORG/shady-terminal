name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  distribution:
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Test and build distributions
        run: ./gradlew test installDist buildDMG -PskipIntellijPlugin=true --no-daemon
      - name: Package release assets
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          arch="${{ matrix.arch }}"
          assets_dir="release-assets"
          mkdir -p "$assets_dir"

          cli_asset="shady-macos-${arch}.tar.gz"
          versioned_cli_asset="shady-${version}-macos-${arch}.tar.gz"
          tar -C build/install -czf "$assets_dir/$cli_asset" shady
          cp "$assets_dir/$cli_asset" "$assets_dir/$versioned_cli_asset"

          dmg_source="$(find build/compose/binaries/main/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          if [[ -z "$dmg_source" ]]; then
            printf 'No DMG was produced under build/compose/binaries/main/dmg.\n' >&2
            exit 1
          fi
          dmg_asset="Shady-macos-${arch}.dmg"
          versioned_dmg_asset="Shady-${version}-macos-${arch}.dmg"
          cp "$dmg_source" "$assets_dir/$dmg_asset"
          cp "$dmg_source" "$assets_dir/$versioned_dmg_asset"

          (
            cd "$assets_dir"
            for asset in "$cli_asset" "$versioned_cli_asset" "$dmg_asset" "$versioned_dmg_asset"; do
              shasum -a 256 "$asset" > "$asset.sha256"
            done
          )
      - uses: actions/upload-artifact@v4
        with:
          name: shady-macos-${{ matrix.arch }}
          path: release-assets/*

  intellij-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build IntelliJ plugin
        run: ./gradlew -p intellij-plugin test buildPlugin --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: shady-intellij-plugin
          path: intellij-plugin/build/distributions/*.zip

  publish:
    needs: [distribution, intellij-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksum manifest
        working-directory: dist
        run: |
          find . -maxdepth 1 -type f ! -name '*.sha256' ! -name 'checksums.txt' -printf '%f\n' \
            | sort \
            | xargs shasum -a 256 > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --generate-notes
